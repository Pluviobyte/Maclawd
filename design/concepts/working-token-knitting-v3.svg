<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500" shape-rendering="crispEdges">
  <g id="yarn-ball">
    <rect x="-4" y="11" width="5" height="5" fill="#7BC8C4"/>
    <rect x="-3" y="10" width="3" height="1" fill="#AEE1DE"/>
    <rect x="-3" y="12" width="4" height="1" fill="#3E7775"/>
