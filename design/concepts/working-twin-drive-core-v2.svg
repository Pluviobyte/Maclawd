<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="-15 -25 45 45"
     width="500"
     height="500"
     shape-rendering="crispEdges">
  <title>Maclawd Working Twin Drive Core V2 Concept</title>
  <desc>A compact two-wheel work core held directly between Maclawd's claws.</desc>
  <defs>
    <g id="gear-amber">
      <g fill="#FFC107">
        <rect x="-2" y="-1" width="5" height="3"/>
        <rect x="-1" y="-2" width="3" height="5"/>
        <rect x="0" y="-3" width="1" height="1"/>
        <rect x="0" y="3" width="1" height="1"/>
        <rect x="-3" y="0" width="1" height="1"/>
        <rect x="3" y="0" width="1" height="1"/>
      </g>
      <rect x="-1" y="-1" width="3" height="3" fill="#FFE082"/>
      <rect x="0" y="0" width="1" height="1" fill="#1E1E2E"/>
    </g>

    <g id="gear-cyan">
      <g fill="#40C4FF">
        <rect x="-1" y="-1" width="3" height="3"/>
        <rect x="0" y="-2" width="1" height="5"/>
        <rect x="-2" y="0" width="1" height="1"/>
        <rect x="2" y="0" width="1" height="1"/>
      </g>
      <rect x="0" y="0" width="1" height="1" fill="#1E1E2E"/>
    </g>
  </defs>

  <g id="maclawd-body">
    <g id="body-color-group" fill="#DE886D">
      <rect id="outer-left-leg" x="3" y="13" width="1" height="2"/>
      <rect id="inner-left-leg" x="5" y="13" width="1" height="2"/>
      <rect id="inner-right-leg" x="9" y="13" width="1" height="2"/>
      <rect id="outer-right-leg" x="11" y="13" width="1" height="2"/>
      <rect id="torso" x="2" y="6" width="11" height="7"/>
      <rect id="left-arm" x="0" y="9" width="2" height="2"/>
      <rect id="right-arm" x="13" y="9" width="2" height="2"/>
    </g>

    <g id="eyes-js" fill="#000000">
      <rect id="left-eye" x="4" y="8" width="1" height="2"/>
      <rect id="right-eye" x="10" y="8" width="1" height="2"/>
    </g>
  </g>

  <!-- One compact chest-height work core, held by both claws. -->
  <g id="twin-drive-frame" fill="#455A64">
    <rect x="1" y="10" width="13" height="1"/>
    <rect x="2" y="11" width="1" height="3"/>
    <rect x="12" y="11" width="1" height="3"/>
    <rect x="2" y="14" width="11" height="1"/>
  </g>

  <rect x="0" y="10" width="2" height="1" fill="#FFC107"/>
  <rect x="13" y="10" width="2" height="1" fill="#40C4FF"/>

  <g transform="translate(6 12)"><use href="#gear-amber"/></g>
  <g transform="translate(10 12)"><use href="#gear-cyan"/></g>
</svg>
