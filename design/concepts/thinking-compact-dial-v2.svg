<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="-15 -25 45 45"
     width="500"
     height="500"
     shape-rendering="crispEdges">
  <title>Maclawd Thinking Compact Dial V2 Concept</title>
  <desc>A compact three-position selector mounted directly against Maclawd's left shoulder.</desc>

  <!-- Compact housing: six pixels wide, attached directly to the left shoulder. -->
  <g id="compact-dial-housing" fill="#455A64">
    <rect x="-3" y="4" width="4" height="6"/>
    <rect x="-4" y="5" width="6" height="4"/>
    <rect x="1" y="6" width="1" height="2"/>
  </g>

  <!-- Three physical stops; the middle stop is selected. -->
  <rect x="-3" y="4" width="1" height="1" fill="#455A64"/>
  <rect x="-1" y="3" width="1" height="1" fill="#D7F3FF"/>
  <rect x="1" y="4" width="1" height="1" fill="#455A64"/>

  <g id="compact-dial-pointer">
    <rect x="-1" y="4" width="1" height="3" fill="#FFC107"/>
    <rect x="-1" y="6" width="1" height="2" fill="#FFE082"/>
    <rect x="-1" y="7" width="1" height="1" fill="#1E1E2E"/>
  </g>

  <g id="maclawd-body">
    <g id="body-color-group" fill="#DE886D">
      <rect id="outer-left-leg" x="3" y="13" width="1" height="2"/>
      <rect id="inner-left-leg" x="5" y="13" width="1" height="2"/>
      <rect id="inner-right-leg" x="9" y="13" width="1" height="2"/>
      <rect id="outer-right-leg" x="11" y="13" width="1" height="2"/>
      <rect id="torso" x="2" y="6" width="11" height="7"/>

      <g id="left-dial-claw">
        <rect id="left-arm" x="0" y="9" width="2" height="2"/>
        <rect x="-1" y="9" width="1" height="1" fill="#FFC107"/>
      </g>
      <g id="right-resting-claw">
        <rect id="right-arm" x="13" y="9" width="2" height="2"/>
      </g>
    </g>

    <g id="eyes-js" fill="#000000">
      <rect id="left-eye" x="4" y="8" width="1" height="2"/>
      <rect id="right-eye" x="10" y="8" width="1" height="2"/>
    </g>
  </g>
</svg>
