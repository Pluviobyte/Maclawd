<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500" shape-rendering="crispEdges">
  <title>Maclawd Sleeping Dock Nest</title>
  <desc>Maclawd rests inside a low charging dock with closed eyes and an attached status light.</desc>
  <g id="dock-back" fill="#455A64">
    <rect x="1" y="13" width="13" height="4"/>
    <rect x="0" y="14" width="2" height="3"/>
    <rect x="13" y="14" width="2" height="3"/>
  </g>
  <g id="maclawd-body" transform="translate(0 2)">
    <g id="body-color-group" fill="#DE886D">
      <rect id="outer-left-leg" x="3" y="13" width="1" height="2"/>
      <rect id="inner-left-leg" x="5" y="13" width="1" height="2"/>
      <rect id="inner-right-leg" x="9" y="13" width="1" height="2"/>
      <rect id="outer-right-leg" x="11" y="13" width="1" height="2"/>
      <rect id="torso" x="2" y="6" width="11" height="7"/>
      <rect id="left-arm" x="0" y="9" width="2" height="2"/>
      <rect id="right-arm" x="13" y="9" width="2" height="2"/>
    </g>
    <g id="eyes-js" fill="#000000" transform="translate(0 4.5) scale(1 .5) translate(0 -4.5)">
      <rect id="left-eye" x="4" y="8" width="1" height="2"/>
      <rect id="right-eye" x="10" y="8" width="1" height="2"/>
    </g>
  </g>
  <g id="dock-front">
    <rect x="2" y="15" width="11" height="2" fill="#1E1E2E"/>
    <rect x="7" y="16" width="1" height="1" fill="#40C4FF"/>
    <rect x="0" y="14" width="2" height="1" fill="#D7F3FF"/>
    <rect x="13" y="14" width="2" height="1" fill="#D7F3FF"/>
  </g>
</svg>
