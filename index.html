<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Maclawd — Complete Motion Lab</title>
    <style>
      :root { color-scheme: light; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; background:#f4f1ea; color:#1e1e2e; }
      * { box-sizing:border-box; }
      body { min-height:100vh; margin:0; padding:48px 24px 72px; }
      main { width:min(1440px, 100%); margin:0 auto; }
      header { max-width:820px; margin-bottom:42px; }
      .eyebrow { margin:0 0 10px; color:#c67a62; font-size:13px; font-weight:780; letter-spacing:.12em; text-transform:uppercase; }
      h1 { margin:0; font-size:clamp(44px,7vw,82px); line-height:.94; letter-spacing:-.04em; }
      header p, .copy p, .section-head p { color:#50505e; line-height:1.58; }
      .section { margin-top:48px; }
      .section-head { display:flex; align-items:end; justify-content:space-between; gap:20px; margin:0 0 18px; }
      .section-head h2 { margin:0; font-size:30px; }
      .section-head p { max-width:580px; margin:0; }
      .motion-grid { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:18px; }
      .motion-card { overflow:hidden; border:1px solid rgba(30,30,46,.11); border-radius:26px; background:#fbfaf7; box-shadow:0 16px 46px rgba(30,30,46,.075); }
      .stage { aspect-ratio:1; background:linear-gradient(rgba(30,30,46,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(30,30,46,.035) 1px,transparent 1px),#fbfaf7; background-size:24px 24px; }
      object { width:100%; height:100%; }
      .copy { padding:0 19px 21px; }
      .copy h3 { margin:2px 0 7px; font-size:20px; }
      .copy p { min-height:50px; margin:0; font-size:14px; }
      .state-id { color:#c67a62; font:12px ui-monospace,SFMono-Regular,Menlo,monospace; }
      .chips { display:flex; flex-wrap:wrap; gap:6px; margin-top:15px; }
      .chip { padding:6px 9px; border-radius:999px; background:#fff; border:1px solid rgba(30,30,46,.1); font-size:11px; font-weight:680; }
      .note { margin-top:32px; padding:18px 20px; border:1px solid rgba(30,30,46,.1); border-radius:18px; color:#626271; background:rgba(255,255,255,.45); font-size:14px; }
      .note a { color:#a55f4c; }
      @media(max-width:1080px){.motion-grid{grid-template-columns:repeat(3,minmax(0,1fr));}}
      @media(max-width:760px){.motion-grid{grid-template-columns:repeat(2,minmax(0,1fr));}.section-head{display:block}.section-head p{margin-top:8px}}
      @media(max-width:520px){body{padding:30px 14px 48px}.motion-grid{grid-template-columns:1fr}.copy p{min-height:0}}
    </style>
  </head>
  <body>
    <main>
      <header>
        <p class="eyebrow">Maclawd · Complete motion lab</p>
        <h1>状态会变化，<br>角色还是它。</h1>
        <p>身体、眼睛、颜色与坐标保持不变；先用身体姿势讲清语义，只在必要时加入一个大而熟悉的道具。这里汇总 12 个主状态、5 个工作修饰和 6 个互动彩蛋。</p>
      </header>
      <div id="lab"></div>
      <p class="note">旧的机械候选仍保留在 <a href="design/concepts/all-primary-states.html">静态概念档案</a>；当前页面展示的是新的趣味动作方向。</p>
    </main>
    <script>
      const groups = [
        {
          title: "12 个主状态",
          copy: "用于表达 owner 与 Agent 的稳定主状态；休眠链、任务链和结果链都有明确转场。",
          items: [
            ["idle","Calm Calibration","calm-calibration.svg","5.6s loop","呼吸、观察、眨眼"],
            ["away","Blanket Drag","blanket-drag.svg","3.8s transition","伸懒腰后拖来一条大毛毯"],
            ["sleeping","Top-down Sleep","blanket-burrito.svg","6.4s loop","俯视平躺在枕头上，盖被呼吸并冒出像素 Zzz"],
            ["waking","Blanket Wake","blanket-pop.svg","2.6s transition","弹起时整条毛毯滑到身后"],
            ["thinking","Claw Count","shell-shuffle.svg","4.6s loop","左右数爪并停在决定姿势"],
            ["working","Busy Claws","token-knitting.svg","3.4s loop","双爪交替忙碌后检查成果"],
            ["delegating","Helper Handoff","hatchling-parade.svg","5.0s loop","向两个大助手交接并送它们出发"],
            ["needs_owner","Jar Assist","stuck-jar.svg","4.8s loop","拧不开大罐子后推给主人"],
            ["compacting","Pocket Fold","accordion-fold.svg","4.8s loop","把一条大折页压成口袋大小"],
            ["workspace","Rollout Mat","pop-up-studio.svg","4.2s transition","展开条纹工作垫并站上去"],
            ["success","Self High-five","self-high-five.svg","2.9s reaction","双爪在头顶真正碰到并停顿"],
            ["error","Failed Stand","yarn-tangle.svg","4.8s loop","左右摇晃、倒下、再爬起来"]
          ]
        },
        {
          title: "5 个 working 活动修饰",
          copy: "只有拿到可靠的活动类别时才覆盖 generic working；command 不单独画一套，统一回退到 Busy Claws。",
          items: [
            ["working.reading","Open Book","card-browsing.svg","5.0s loop","读一本身体宽度的打开书并翻页"],
            ["working.writing","Big Pencil","note-stitching.svg","4.6s loop","用一支大铅笔在整张纸上书写"],
            ["working.building","Two-block Build","block-tower.svg","5.0s loop","搬起大积木并叠成两层"],
            ["working.testing","Roly-poly Test","wobble-test.svg","4.8s loop","轻推一个不倒翁并观察回正"],
            ["working.syncing","Chest Relay","relay-bead.svg","4.4s loop","沿胸前绳索传递一颗大珠子"]
          ]
        },
        {
          title: "6 个互动与环境彩蛋",
          copy: "这些动作由桌面交互或环境事件触发，不冒充 Agent 的具体任务进度。",
          items: [
            ["interaction.click","Click Flinch","click-flinch.svg","2.2s reaction","被轻点后眯眼回望"],
            ["interaction.double_click","Surprised Hop","surprised-hop.svg","2.4s reaction","连点触发一次惊喜小跳"],
            ["interaction.drag","Drag Cling","drag-cling.svg","3.2s held loop","被拖动时双爪抓紧"],
            ["interaction.drop","Drop Wobble","drop-wobble.svg","2.6s reaction","落地压扁、回弹、站稳"],
            ["ambient.edge","Edge Peek","edge-peek.svg","4.6s loop","从屏幕边缘偷看再躲回去"],
            ["ambient.low_battery","Low Battery Droop","low-battery-droop.svg","6.2s loop","不靠图标，只用半闭眼和长停顿"]
          ]
        }
      ];
      const lab = document.querySelector("#lab");
      for (const group of groups) {
        const section = document.createElement("section"); section.className = "section";
        section.innerHTML = `<div class="section-head"><h2>${group.title}</h2><p>${group.copy}</p></div><div class="motion-grid"></div>`;
        const grid = section.querySelector(".motion-grid");
        for (const [id,name,file,timing,story] of group.items) {
          const article = document.createElement("article"); article.className = "motion-card";
          article.innerHTML = `<div class="stage"><object data="src/animations/${file}" type="image/svg+xml">${name}</object></div><div class="copy"><span class="state-id">${id}</span><h3>${name}</h3><p>${story}</p><div class="chips"><span class="chip">${timing}</span><span class="chip">96px checked</span></div></div>`;
          grid.append(article);
        }
        lab.append(section);
      }
    </script>
  </body>
</html>
