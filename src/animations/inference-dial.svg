<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="-15 -25 45 45"
     width="500"
     height="500"
     shape-rendering="crispEdges">
  <title>Maclawd Inference Dial</title>
  <desc>Maclawd compares three choices on a shoulder-mounted mechanical dial.</desc>
  <defs>
    <style>
      .thinking-body {
        transform-box: view-box;
        transform-origin: 7.5px 15px;
        animation: thinking-recoil 2.4s infinite step-end;
      }

      .dial-pointer {
        transform-box: view-box;
        transform-origin: -4px 5px;
        animation: dial-pointer 2.4s infinite step-end;
      }

      .notch-left { animation: notch-left 2.4s infinite step-end; }
      .notch-center { animation: notch-center 2.4s infinite step-end; }
      .notch-right { animation: notch-right 2.4s infinite step-end; }

      .thinking-left-claw {
        transform-box: view-box;
        transform-origin: 2px 10px;
        animation: thinking-left-claw 2.4s infinite step-end;
      }

      .thinking-right-claw {
        transform-box: view-box;
        transform-origin: 13px 10px;
        animation: thinking-right-claw 2.4s infinite step-end;
      }

      .thinking-gaze { animation: thinking-gaze 2.4s infinite step-end; }

      .thinking-blink {
        transform-box: view-box;
        transform-origin: 7.5px 9px;
        animation: thinking-blink 2.4s infinite step-end;
      }

      @keyframes thinking-recoil {
        0%, 14%, 30%, 44%, 60%, 74%, 90%, 100% { transform: translate(0, 0); }
        15%, 29%, 45%, 59%, 75%, 89% { transform: translate(0.5px, 0.5px); }
      }

      @keyframes dial-pointer {
        0%, 14%, 60%, 74%, 100% { transform: rotate(-45deg); }
        15%, 29%, 45%, 59%, 75%, 89% { transform: rotate(0deg); }
        30%, 44% { transform: rotate(45deg); }
        90%, 99% { transform: rotate(-45deg); }
      }

      @keyframes notch-left {
        0%, 14%, 60%, 74%, 90%, 100% { fill: #D7F3FF; }
        15%, 59%, 75%, 89% { fill: #455A64; }
      }

      @keyframes notch-center {
        0%, 14%, 30%, 44%, 60%, 74%, 90%, 100% { fill: #455A64; }
        15%, 29%, 45%, 59%, 75%, 89% { fill: #D7F3FF; }
      }

      @keyframes notch-right {
        0%, 29%, 45%, 100% { fill: #455A64; }
        30%, 44% { fill: #D7F3FF; }
      }

      @keyframes thinking-left-claw {
        0%, 14%, 60%, 74%, 90%, 100% { transform: rotate(-10deg); }
        15%, 29%, 45%, 59%, 75%, 89% { transform: rotate(0deg); }
        30%, 44% { transform: rotate(10deg); }
      }

      @keyframes thinking-right-claw {
        0%, 14%, 30%, 44%, 60%, 74%, 90%, 100% { transform: rotate(-16deg); }
        15%, 29%, 45%, 59%, 75%, 89% { transform: rotate(-12deg); }
      }

      @keyframes thinking-gaze {
        0%, 14%, 60%, 74%, 90%, 100% { transform: translateX(-1px); }
        15%, 29%, 45%, 59%, 75%, 89% { transform: translateX(0); }
        30%, 44% { transform: translateX(1px); }
      }

      @keyframes thinking-blink {
        0%, 90%, 97%, 100% { transform: scaleY(1); }
        91%, 96% { transform: scaleY(0.1); }
      }

      @media (prefers-reduced-motion: reduce) {
        .thinking-body,
        .dial-pointer,
        .notch-left,
        .notch-center,
        .notch-right,
        .thinking-left-claw,
        .thinking-right-claw,
        .thinking-gaze {
          animation: none;
        }

        .notch-center { fill: #D7F3FF; }
        .thinking-blink { animation: thinking-reduced-blink 8s 1 step-end; }
      }

      @keyframes thinking-reduced-blink {
        0%, 72%, 82%, 100% { transform: scaleY(1); }
        73%, 81% { transform: scaleY(0.1); }
      }
    </style>
  </defs>

  <!-- The three-position dial is bolted to the left shoulder rail. -->
  <g id="shoulder-rail" fill="#455A64">
    <rect x="-2" y="5" width="18" height="1"/>
    <rect x="1" y="5" width="1" height="2"/>
    <rect x="14" y="5" width="1" height="2"/>
  </g>

  <g id="dial-housing" fill="#455A64">
    <rect x="-9" y="0" width="2" height="9"/>
    <rect x="-7" y="-2" width="6" height="2"/>
    <rect x="-1" y="0" width="2" height="9"/>
    <rect x="-7" y="8" width="6" height="2"/>
    <rect x="-8" y="1" width="2" height="2" class="notch-left"/>
    <rect x="-5" y="-1" width="2" height="2" class="notch-center"/>
    <rect x="-2" y="1" width="2" height="2" class="notch-right"/>
    <rect x="-5" y="4" width="2" height="2" fill="#1E1E2E"/>
  </g>

  <g id="dial-pointer" class="dial-pointer">
    <rect x="-5" y="0" width="2" height="5" fill="#FFC107"/>
    <rect x="-5" y="-1" width="2" height="2" fill="#FFE082"/>
    <rect x="-5" y="4" width="2" height="2" fill="#1E1E2E"/>
  </g>

  <g id="selector-linkage">
    <rect x="-4" y="6" width="5" height="1" fill="#455A64"/>
    <rect x="0" y="6" width="1" height="3" fill="#455A64"/>
    <rect x="-4" y="6" width="1" height="1" fill="#40C4FF"/>
  </g>

  <g id="right-axle-brace">
    <rect x="14" y="5" width="2" height="1" fill="#1E1E2E"/>
    <rect x="15" y="6" width="1" height="3" fill="#455A64"/>
    <rect x="14" y="5" width="1" height="1" fill="#40C4FF"/>
  </g>

  <g id="maclawd-body" class="thinking-body">
    <g id="body-color-group" fill="#DE886D">
      <rect id="outer-left-leg" x="3" y="13" width="1" height="2"/>
      <rect id="inner-left-leg" x="5" y="13" width="1" height="2"/>
      <rect id="inner-right-leg" x="9" y="13" width="1" height="2"/>
      <rect id="outer-right-leg" x="11" y="13" width="1" height="2"/>
      <rect id="torso" x="2" y="6" width="11" height="7"/>

      <g id="left-selector-claw" class="thinking-left-claw">
        <rect id="left-arm" x="0" y="9" width="2" height="2"/>
        <rect x="-1" y="8" width="2" height="1" fill="#455A64"/>
        <rect x="-2" y="7" width="2" height="1" fill="#FFC107"/>
      </g>
      <g id="right-brace-claw" class="thinking-right-claw">
        <rect id="right-arm" x="13" y="9" width="2" height="2"/>
        <rect x="15" y="8" width="1" height="2" fill="#455A64"/>
        <rect x="15" y="7" width="1" height="1" fill="#40C4FF"/>
      </g>
    </g>

    <g id="eyes-js" class="thinking-gaze" fill="#000000">
      <g class="thinking-blink">
        <rect id="left-eye" x="4" y="8" width="1" height="2"/>
        <rect id="right-eye" x="10" y="8" width="1" height="2"/>
      </g>
    </g>
  </g>
</svg>
