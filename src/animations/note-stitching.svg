<?xml-stylesheet type="text/css" href="maclawd-actions.css"?>
<svg xmlns="http://www.w3.org/2000/svg" class="state-writing" viewBox="-15 -25 45 45" width="500" height="500" shape-rendering="crispEdges">
  <title>Maclawd Letter Desk</title><desc>Maclawd leans over a low wooden desk and writes across one clear letter with a body-length pencil.</desc>
  <g class="letter-desk"><path d="M-7 11H22V17H-7Z" fill="#7C5A3B"/><path d="M-6 10H21V15H-6Z" fill="#F0C98F"/><rect x="-4" y="15" width="3" height="5" fill="#7C5A3B"/><rect x="16" y="15" width="3" height="5" fill="#7C5A3B"/></g>
  <g class="sheet motion"><path d="M-1 12H12V18H-1Z" fill="#FFF4D7"/><rect x="1" y="14" width="8" height="1" fill="#D9C79F"/><rect x="1" y="16" width="6" height="1" fill="#D9C79F"/></g>
  <g class="pencil motion"><rect x="10" y="3" width="3" height="12" fill="#F6C85F"/><rect x="10" y="3" width="3" height="2" fill="#C98FBA"/><path d="M10 15H13L11 18Z" fill="#D8B07C"/><rect x="11" y="16" width="1" height="2" fill="#544942"/></g>
  <g class="actor motion"><g fill="#DE886D">
    <rect id="outer-left-leg" x="3" y="13" width="1" height="2"/><rect id="inner-left-leg" x="5" y="13" width="1" height="2"/><rect id="inner-right-leg" x="9" y="13" width="1" height="2"/><rect id="outer-right-leg" x="11" y="13" width="1" height="2"/><rect id="torso" x="2" y="6" width="11" height="7"/>
    <g class="left-claw motion"><rect id="left-arm" x="0" y="9" width="2" height="2"/></g><g class="right-claw motion"><rect id="right-arm" x="13" y="9" width="2" height="2"/></g>
  </g><g class="eyes motion blink" fill="#000"><rect id="left-eye" x="4" y="8" width="1" height="2"/><rect id="right-eye" x="10" y="8" width="1" height="2"/></g></g>
</svg>
