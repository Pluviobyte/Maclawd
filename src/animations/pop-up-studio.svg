<?xml-stylesheet type="text/css" href="maclawd-actions.css"?>
<svg xmlns="http://www.w3.org/2000/svg" class="state-workspace" viewBox="-15 -25 45 45" width="500" height="500" shape-rendering="crispEdges">
  <title>Maclawd Workspace Folder</title><desc>Maclawd pops open one upright workspace folder beside its body and settles into a ready pose.</desc>
  <g class="mat motion"><path d="M9 2H15V4H18V18H9Z" fill="#3E7775"/><path d="M10 3H14V5H17V17H10Z" fill="#7BC8C4"/><rect x="11" y="7" width="5" height="2" fill="#BDE7E4"/><rect x="11" y="11" width="4" height="2" fill="#F6C85F"/><rect x="11" y="15" width="5" height="1" fill="#B9A1D9"/></g>
  <g class="roll motion"><path d="M8 1H14V5H8Z" fill="#544942"/><rect x="9" y="2" width="4" height="2" fill="#FFF4D7"/></g>
  <g class="actor motion"><g fill="#DE886D">
    <rect id="outer-left-leg" x="3" y="13" width="1" height="2"/><rect id="inner-left-leg" x="5" y="13" width="1" height="2"/><rect id="inner-right-leg" x="9" y="13" width="1" height="2"/><rect id="outer-right-leg" x="11" y="13" width="1" height="2"/><rect id="torso" x="2" y="6" width="11" height="7"/>
    <g class="left-claw motion"><rect id="left-arm" x="0" y="9" width="2" height="2"/></g><g class="right-claw motion"><rect id="right-arm" x="13" y="9" width="2" height="2"/></g>
  </g><g class="eyes motion blink" fill="#000"><rect id="left-eye" x="4" y="8" width="1" height="2"/><rect id="right-eye" x="10" y="8" width="1" height="2"/></g></g>
</svg>
