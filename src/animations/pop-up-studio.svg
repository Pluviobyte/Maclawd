<?xml-stylesheet type="text/css" href="maclawd-actions.css"?>
<svg xmlns="http://www.w3.org/2000/svg" class="state-workspace" viewBox="-15 -25 45 45" width="500" height="500" shape-rendering="crispEdges">
  <title>Maclawd Pop-up Studio</title>
  <desc>Maclawd opens a tiny paper studio from a flat folded packet.</desc>
  <g class="studio-left motion"><rect x="-1" y="8" width="5" height="8" fill="#7BC8C4"/><rect x="0" y="9" width="3" height="2" fill="#DDF3F1"/><rect x="0" y="13" width="3" height="1" fill="#3E7775"/></g>
  <g class="studio-right motion"><rect x="11" y="8" width="5" height="8" fill="#F6C85F"/><rect x="12" y="9" width="3" height="2" fill="#FFF3C4"/><rect x="12" y="13" width="3" height="1" fill="#B88B27"/></g>
  <g class="studio-desk motion"><rect x="2" y="14" width="11" height="2" fill="#5A4A42"/><rect x="3" y="16" width="1" height="2" fill="#5A4A42"/><rect x="11" y="16" width="1" height="2" fill="#5A4A42"/></g>
  <g class="actor motion">
    <g fill="#DE886D">
      <rect id="outer-left-leg" x="3" y="13" width="1" height="2"/><rect id="inner-left-leg" x="5" y="13" width="1" height="2"/><rect id="inner-right-leg" x="9" y="13" width="1" height="2"/><rect id="outer-right-leg" x="11" y="13" width="1" height="2"/>
      <rect id="torso" x="2" y="6" width="11" height="7"/><g class="left-claw motion"><rect id="left-arm" x="0" y="9" width="2" height="2"/></g><g class="right-claw motion"><rect id="right-arm" x="13" y="9" width="2" height="2"/></g>
    </g>
    <g class="eyes motion blink" fill="#000000"><rect id="left-eye" x="4" y="8" width="1" height="2"/><rect id="right-eye" x="10" y="8" width="1" height="2"/></g>
  </g>
</svg>
