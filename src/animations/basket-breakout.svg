<?xml-stylesheet type="text/css" href="maclawd-actions.css"?>
<svg xmlns="http://www.w3.org/2000/svg" class="state-recovering" viewBox="-15 -25 45 45" width="500" height="500" shape-rendering="crispEdges">
  <title>Maclawd Basket Breakout</title><desc>Maclawd pushes the overlapping basket aside, shakes itself straight, and regains its stance.</desc>
  <g class="actor motion"><g fill="#DE886D">
    <rect id="outer-left-leg" x="3" y="13" width="1" height="2"/><rect id="inner-left-leg" x="5" y="13" width="1" height="2"/><rect id="inner-right-leg" x="9" y="13" width="1" height="2"/><rect id="outer-right-leg" x="11" y="13" width="1" height="2"/><rect id="torso" x="2" y="6" width="11" height="7"/>
    <g class="left-claw motion"><rect id="left-arm" x="0" y="9" width="2" height="2"/></g><g class="right-claw motion"><rect id="right-arm" x="13" y="9" width="2" height="2"/></g>
  </g><g class="eyes motion blink" fill="#000000"><rect id="left-eye" x="4" y="8" width="1" height="2"/><rect id="right-eye" x="10" y="8" width="1" height="2"/></g></g>
  <g class="basket motion"><path d="M-1 7H16V9H15V17H0V9H-1Z" fill="#8A5E3B"/><path d="M0 9H15V16H0Z" fill="#D4A66D"/><rect x="2" y="10" width="2" height="5" fill="#F0C98F"/><rect x="7" y="10" width="2" height="5" fill="#F0C98F"/><rect x="12" y="10" width="2" height="5" fill="#F0C98F"/><rect x="0" y="12" width="15" height="2" fill="#A87447"/></g>
</svg>
