<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="-15 -25 45 45"
     width="500"
     height="500"
     shape-rendering="crispEdges">
  <title>Maclawd Stuck Jar</title>
  <desc>Maclawd twists a stubborn jar twice, strains, then offers it to the owner for help.</desc>
  <defs>
    <style>
      .jar-body,
      .jar-left-claw,
      .jar-right-claw,
      .jar-object,
      .jar-lid,
      .jar-gaze,
      .jar-eyes {
        transform-box: view-box;
        animation-duration: 4.2s;
        animation-iteration-count: infinite;
        animation-timing-function: step-end;
      }

      .jar-body { transform-origin: 7.5px 15px; animation-name: jar-body-story; }
      .jar-left-claw { transform-origin: 1px 10px; animation-name: jar-left-story; }
      .jar-right-claw { transform-origin: 14px 10px; animation-name: jar-right-story; }
      .jar-object { transform-origin: 7.5px 13px; animation-name: jar-offer-story; }
      .jar-lid { transform-origin: 7.5px 10px; animation-name: jar-lid-story; }
      .jar-gaze { animation-name: jar-gaze-story; }
      .jar-eyes { transform-origin: 7.5px 9px; animation-name: jar-eye-story; }

      @keyframes jar-body-story {
        0%, 10%, 28%, 46%, 64%, 100% { transform: translateY(-1px); }
        11%, 19%, 29%, 37% { transform: translate(-1px, 0) scaleY(0.94); }
        20%, 27%, 38%, 45% { transform: translate(1px, 0) scaleY(0.94); }
        47%, 63% { transform: translate(0, 1px) scaleY(0.9); }
        65%, 88% { transform: translate(0, -2px); }
        89%, 96% { transform: translateY(0); }
        97%, 99% { transform: translateY(-1px); }
      }

      @keyframes jar-left-story {
        0%, 10%, 46%, 64%, 100% { transform: translate(4px, 1px); }
        11%, 19%, 29%, 37% { transform: translate(5px, 0); }
        20%, 27%, 38%, 45% { transform: translate(3px, 1px); }
        47%, 63% { transform: translate(4px, 2px); }
        65%, 88% { transform: translate(3px, 3px); }
        89%, 99% { transform: translate(4px, 1px); }
      }

      @keyframes jar-right-story {
        0%, 10%, 46%, 64%, 100% { transform: translate(-4px, 1px); }
        11%, 19%, 29%, 37% { transform: translate(-3px, 1px); }
        20%, 27%, 38%, 45% { transform: translate(-5px, 0); }
        47%, 63% { transform: translate(-4px, 2px); }
        65%, 88% { transform: translate(-3px, 3px); }
        89%, 99% { transform: translate(-4px, 1px); }
      }

      @keyframes jar-offer-story {
        0%, 46%, 64%, 100% { transform: translate(0, 0) scale(1); }
        11%, 19%, 29%, 37% { transform: translate(-1px, 0) scale(1); }
        20%, 27%, 38%, 45% { transform: translate(1px, 0) scale(1); }
        47%, 63% { transform: translate(0, 1px) scale(1); }
        65%, 88% { transform: translate(0, 2px) scale(1.18); }
        89%, 96% { transform: translate(0, 1px) scale(1.08); }
        97%, 99% { transform: translate(0, 0) scale(1); }
      }

      @keyframes jar-lid-story {
        0%, 10%, 28%, 46%, 64%, 100% { transform: translateX(0); }
        11%, 19%, 29%, 37% { transform: translateX(-1px); }
        20%, 27%, 38%, 45% { transform: translateX(1px); }
        47%, 63% { transform: translateX(0); }
        65%, 88% { transform: translateY(-1px); }
        89%, 99% { transform: translateY(0); }
      }

      @keyframes jar-gaze-story {
        0%, 64%, 100% { transform: translate(0, 1px); }
        65%, 88% { transform: translate(0, 0); }
        89%, 99% { transform: translate(0, 1px); }
      }

      @keyframes jar-eye-story {
        0%, 10%, 28%, 46%, 64%, 88%, 100% { transform: scaleY(1); }
        11%, 27%, 29%, 45% { transform: scaleY(0.55); }
        47%, 63% { transform: scaleY(0.35); }
        89%, 90% { transform: scaleY(1); }
        91%, 94% { transform: scaleY(0.1); }
        95%, 100% { transform: scaleY(1); }
      }

      @media (prefers-reduced-motion: reduce) {
        .jar-body,
        .jar-left-claw,
        .jar-right-claw,
        .jar-object,
        .jar-lid,
        .jar-gaze { animation: none; }
        .jar-eyes { animation: jar-reduced-blink 8s 1 step-end; }
      }

      @keyframes jar-reduced-blink {
        0%, 72%, 82%, 100% { transform: scaleY(1); }
        73%, 81% { transform: scaleY(0.1); }
      }
    </style>
  </defs>

  <g id="body-js" class="jar-body">
    <g id="body-color-group" fill="#DE886D">
      <rect id="outer-left-leg" x="3" y="13" width="1" height="2"/>
      <rect id="inner-left-leg" x="5" y="13" width="1" height="2"/>
      <rect id="inner-right-leg" x="9" y="13" width="1" height="2"/>
      <rect id="outer-right-leg" x="11" y="13" width="1" height="2"/>
      <rect id="torso" x="2" y="6" width="11" height="7"/>
      <g class="jar-left-claw"><rect id="left-arm" x="0" y="9" width="2" height="2"/></g>
      <g class="jar-right-claw"><rect id="right-arm" x="13" y="9" width="2" height="2"/></g>
    </g>
    <g id="eyes-js" class="jar-gaze" fill="#000000">
      <g class="jar-eyes">
        <rect id="left-eye" x="4" y="8" width="1" height="2"/>
        <rect id="right-eye" x="10" y="8" width="1" height="2"/>
      </g>
    </g>
  </g>

  <g class="jar-object">
    <g class="jar-lid"><rect x="4" y="9" width="7" height="2" fill="#5A4A42"/></g>
    <rect x="3" y="11" width="9" height="5" fill="#BDE7E4"/>
    <rect x="4" y="12" width="7" height="3" fill="#F4D3E7"/>
    <rect x="4" y="11" width="1" height="1" fill="#FFFFFF"/>
    <rect x="5" y="14" width="5" height="1" fill="#C98FBA"/>
  </g>
</svg>
