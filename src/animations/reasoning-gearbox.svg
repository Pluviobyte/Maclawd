<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="-15 -25 45 45"
     width="500"
     height="500"
     shape-rendering="crispEdges">
  <title>Maclawd Reasoning Gearbox</title>
  <desc>Maclawd operates a shoulder-mounted clutch, crank, and three interlocking pixel gears.</desc>
  <defs>
    <style>
      .body-recoil {
        transform-origin: 7.5px 15px;
        animation: body-recoil 2.8s infinite step-end;
      }

      .left-clutch-hand {
        transform-origin: 2px 10px;
        animation: left-clutch-hand 2.8s infinite step-end;
      }

      .right-crank-hand {
        transform-origin: 13px 10px;
        animation: right-crank-hand 2.8s infinite step-end;
      }

      .eyes-blink {
        transform-origin: 7.5px 9px;
        animation: eyes-blink 2.8s infinite step-end;
      }

      .gear-main,
      .gear-left,
      .gear-right,
      .crank-wheel {
        transform-origin: 0 0;
        transform-box: view-box;
      }

      .gear-main { animation: gear-main 2.8s infinite step-end; }
      .gear-left { animation: gear-left 2.8s infinite step-end; }
      .gear-right { animation: gear-right 2.8s infinite step-end; }
      .crank-wheel { animation: crank-wheel 2.8s infinite step-end; }

      .ratchet {
        animation: ratchet 2.8s infinite step-end;
      }

      .drive-flash {
        animation: drive-flash 2.8s infinite step-end;
      }

      @keyframes body-recoil {
        0%, 19%, 40%, 59%, 80%, 100% { transform: translate(0, 0); }
        20%, 39% { transform: translate(-0.5px, 0.5px); }
        60%, 79% { transform: translate(0.5px, 0.5px); }
      }

      @keyframes left-clutch-hand {
        0%, 19%, 50%, 69%, 100% { transform: rotate(0deg); }
        20%, 34% { transform: rotate(-30deg); }
        35%, 49% { transform: rotate(8deg); }
        70%, 84% { transform: rotate(-18deg); }
        85%, 99% { transform: rotate(5deg); }
      }

      @keyframes right-crank-hand {
        0%, 14%, 100% { transform: rotate(0deg); }
        15%, 29% { transform: rotate(34deg); }
        30%, 44% { transform: rotate(8deg); }
        45%, 59% { transform: rotate(-28deg); }
        60%, 74% { transform: rotate(-6deg); }
        75%, 89% { transform: rotate(24deg); }
        90%, 99% { transform: rotate(6deg); }
      }

      @keyframes eyes-blink {
        0%, 72%, 82%, 100% { transform: scaleY(1); }
        73%, 81% { transform: scaleY(0.1); }
      }

      @keyframes gear-main {
        0%, 12% { transform: rotate(0deg); }
        13%, 24% { transform: rotate(45deg); }
        25%, 36% { transform: rotate(90deg); }
        37%, 49% { transform: rotate(135deg); }
        50%, 61% { transform: rotate(180deg); }
        62%, 74% { transform: rotate(225deg); }
        75%, 87% { transform: rotate(270deg); }
        88%, 99% { transform: rotate(315deg); }
        100% { transform: rotate(360deg); }
      }

      @keyframes gear-left {
        0%, 12% { transform: rotate(0deg); }
        13%, 24% { transform: rotate(-60deg); }
        25%, 36% { transform: rotate(-120deg); }
        37%, 49% { transform: rotate(-180deg); }
        50%, 61% { transform: rotate(-240deg); }
        62%, 74% { transform: rotate(-300deg); }
        75%, 87% { transform: rotate(-360deg); }
        88%, 99% { transform: rotate(-420deg); }
        100% { transform: rotate(-480deg); }
      }

      @keyframes gear-right {
        0%, 12% { transform: rotate(0deg); }
        13%, 24% { transform: rotate(-45deg); }
        25%, 36% { transform: rotate(-90deg); }
        37%, 49% { transform: rotate(-135deg); }
        50%, 61% { transform: rotate(-180deg); }
        62%, 74% { transform: rotate(-225deg); }
        75%, 87% { transform: rotate(-270deg); }
        88%, 99% { transform: rotate(-315deg); }
        100% { transform: rotate(-360deg); }
      }

      @keyframes crank-wheel {
        0%, 24% { transform: rotate(0deg); }
        25%, 49% { transform: rotate(90deg); }
        50%, 74% { transform: rotate(180deg); }
        75%, 99% { transform: rotate(270deg); }
        100% { transform: rotate(360deg); }
      }

      @keyframes ratchet {
        0%, 24%, 50%, 74%, 100% { transform: translateY(0); }
        25%, 49%, 75%, 99% { transform: translateY(1px); }
      }

      @keyframes drive-flash {
        0%, 11%, 25%, 36%, 50%, 61%, 75%, 86%, 100% { opacity: 0.25; }
        12%, 24%, 37%, 49%, 62%, 74%, 87%, 99% { opacity: 1; }
      }
    </style>

    <g id="gear-large">
      <g fill="#FFC107">
        <rect x="-3" y="-2" width="6" height="4"/>
        <rect x="-2" y="-3" width="4" height="6"/>
        <rect x="-1" y="-4" width="2" height="1"/>
        <rect x="-1" y="3" width="2" height="1"/>
        <rect x="-4" y="-1" width="1" height="2"/>
        <rect x="3" y="-1" width="1" height="2"/>
      </g>
      <rect x="-2" y="-1" width="4" height="2" fill="#E7A900"/>
      <rect x="-1" y="-2" width="2" height="4" fill="#FFE082"/>
      <rect x="-1" y="-1" width="2" height="2" fill="#1E1E2E"/>
    </g>

    <g id="gear-small">
      <g fill="#40C4FF">
        <rect x="-2" y="-1" width="4" height="2"/>
        <rect x="-1" y="-2" width="2" height="4"/>
        <rect x="-3" y="0" width="1" height="1"/>
        <rect x="2" y="0" width="1" height="1"/>
        <rect x="0" y="-3" width="1" height="1"/>
        <rect x="0" y="2" width="1" height="1"/>
      </g>
      <rect x="-1" y="0" width="3" height="1" fill="#D7F3FF"/>
      <rect x="0" y="-1" width="1" height="2" fill="#1E1E2E"/>
    </g>
  </defs>

  <!-- A new shoulder-mounted gearbox, with no screen or moving data blocks. -->
  <g id="gearbox-mount" fill="#455A64">
    <rect x="-2" y="0" width="20" height="1"/>
    <rect x="0" y="1" width="1" height="5"/>
    <rect x="14" y="1" width="1" height="5"/>
    <rect x="-1" y="5" width="3" height="1"/>
    <rect x="13" y="5" width="3" height="1"/>
  </g>

  <g transform="translate(7 -4)">
    <g class="gear-main"><use href="#gear-large"/></g>
  </g>
  <g transform="translate(1 0)">
    <g class="gear-left"><use href="#gear-small"/></g>
  </g>
  <g transform="translate(14 0)">
    <g class="gear-right"><use href="#gear-small"/></g>
  </g>

  <g id="left-clutch" class="ratchet">
    <rect x="-3" y="1" width="1" height="8" fill="#455A64"/>
    <rect x="-5" y="7" width="3" height="2" fill="#1E1E2E"/>
    <rect x="-4" y="7" width="1" height="2" fill="#FFC107"/>
  </g>

  <g id="right-drive">
    <rect x="17" y="1" width="1" height="8" fill="#455A64"/>
    <g transform="translate(19 9)">
      <g class="crank-wheel"><use href="#gear-small"/></g>
    </g>
    <rect class="drive-flash" x="17" y="4" width="1" height="2" fill="#D7F3FF"/>
  </g>

  <!-- Locked ground shadow. -->
  <rect id="ground-shadow" x="3" y="15" width="9" height="1" fill="#000000" opacity="0.5"/>

  <g id="maclawd-body" class="body-recoil">
    <g id="body-color-group" fill="#DE886D">
      <!-- Locked legs and torso: exact character coordinates. -->
      <rect id="outer-left-leg" x="3" y="13" width="1" height="2"/>
      <rect id="inner-left-leg" x="5" y="13" width="1" height="2"/>
      <rect id="inner-right-leg" x="9" y="13" width="1" height="2"/>
      <rect id="outer-right-leg" x="11" y="13" width="1" height="2"/>
      <rect id="torso" x="2" y="6" width="11" height="7"/>

      <!-- Locked claw rectangles; only their groups receive new motion. -->
      <g id="left-clutch-hand" class="left-clutch-hand">
        <rect id="left-arm" x="0" y="9" width="2" height="2"/>
        <rect x="-2" y="9" width="2" height="1" fill="#455A64"/>
        <rect x="-4" y="8" width="2" height="1" fill="#FFC107"/>
      </g>
      <g id="right-crank-hand" class="right-crank-hand">
        <rect id="right-arm" x="13" y="9" width="2" height="2"/>
        <rect x="15" y="9" width="3" height="1" fill="#455A64"/>
        <rect x="18" y="8" width="2" height="2" fill="#40C4FF"/>
      </g>
    </g>

    <!-- Locked eye rectangles and color; centered, with blink only. -->
    <g id="eyes-js" class="eyes-blink" fill="#000000">
      <rect id="left-eye" x="4" y="8" width="1" height="2"/>
      <rect id="right-eye" x="10" y="8" width="1" height="2"/>
    </g>
  </g>
</svg>
