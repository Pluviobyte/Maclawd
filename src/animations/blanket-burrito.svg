<?xml-stylesheet type="text/css" href="maclawd-actions.css"?>
<svg xmlns="http://www.w3.org/2000/svg" class="state-sleeping" viewBox="-15 -25 45 45" width="500" height="500" shape-rendering="crispEdges">
  <title>Maclawd Top-down Sleep</title>
  <desc>Seen from directly above, Maclawd lies flat on a pillow under a blanket while three pixel Z shapes rise beside it.</desc>

  <g transform="translate(1.875 0) scale(.75 1)">
    <g class="pillow motion">
      <path d="M-1 3H15V4H17V10H15V11H-1V10H-3V4H-1Z" fill="#F7E7C4"/>
      <rect x="0" y="4" width="14" height="1" fill="#FFFFFF"/>
      <rect x="-1" y="9" width="16" height="1" fill="#E4CFA5"/>
    </g>
  </g>

  <g class="actor motion"><g fill="#DE886D">
    <rect id="outer-left-leg" x="3" y="13" width="1" height="2"/><rect id="inner-left-leg" x="5" y="13" width="1" height="2"/><rect id="inner-right-leg" x="9" y="13" width="1" height="2"/><rect id="outer-right-leg" x="11" y="13" width="1" height="2"/><rect id="torso" x="2" y="6" width="11" height="7"/>
  </g><g class="eyes" fill="#000"><g transform="rotate(90 4.5 9)"><rect id="left-eye" x="4" y="8" width="1" height="2"/></g><g transform="rotate(90 10.5 9)"><rect id="right-eye" x="10" y="8" width="1" height="2"/></g></g></g>

  <g transform="translate(1.875 0) scale(.75 1)"><g class="blanket motion">
    <path d="M-3 11H17V12H19V18H17V19H-3V18H-5V12H-3Z" fill="#B9A1D9"/>
    <rect x="-3" y="11" width="20" height="2" fill="#E7DCF2"/>
    <rect x="-3" y="14" width="20" height="1" fill="#8B73B3"/>
    <rect x="-2" y="17" width="3" height="1" fill="#F6C85F"/>
    <rect x="7" y="17" width="3" height="1" fill="#F6C85F"/>
    <rect x="15" y="17" width="2" height="1" fill="#F6C85F"/>
  </g></g>

  <g class="sleep-claws motion" fill="#DE886D">
    <g class="left-claw"><rect id="left-arm" x="0" y="9" width="2" height="2"/></g>
    <g class="right-claw"><rect id="right-arm" x="13" y="9" width="2" height="2"/></g>
  </g>

  <g transform="translate(13 5)" fill="#72558F"><g class="z-one motion"><rect x="0" y="0" width="3" height="1"/><rect x="1" y="1" width="2" height="1"/><rect x="0" y="2" width="2" height="1"/><rect x="0" y="3" width="3" height="1"/></g></g>
  <g transform="translate(14 0)" fill="#72558F"><g class="z-two motion"><rect x="0" y="0" width="4" height="1"/><rect x="2" y="1" width="2" height="1"/><rect x="1" y="2" width="2" height="1"/><rect x="0" y="3" width="2" height="1"/><rect x="0" y="4" width="4" height="1"/></g></g>
  <g transform="translate(15 -6)" fill="#72558F"><g class="z-three motion"><rect x="0" y="0" width="5" height="1"/><rect x="3" y="1" width="2" height="1"/><rect x="2" y="2" width="2" height="1"/><rect x="1" y="3" width="2" height="1"/><rect x="0" y="4" width="2" height="1"/><rect x="0" y="5" width="5" height="1"/></g></g>
</svg>
